<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Faillissementen</title>

<style>
body{
font-family:Arial;
margin:40px;
background:#f5f5f5
}

table{
border-collapse:collapse;
width:100%;
background:white
}

td,th{
border:1px solid #ddd;
padding:8px
}

th{
background:#333;
color:white
}
</style>

</head>
<body>

<h1>Laatste faillissementen</h1>

<table id="tabel">
<tr>
<th>Bedrijf</th>
<th>Plaats</th>
<th>Datum</th>
</tr>
</table>

<script>

fetch("faillissementen.json")
.then(res => res.json())
.then(data => {

const table = document.getElementById("tabel")

data.forEach(item => {

const tr = document.createElement("tr")

tr.innerHTML = `
<td>${item.bedrijf}</td>
<td>${item.plaats}</td>
<td>${item.datum}</td>
`

table.appendChild(tr)

})

})

</script>

</body>
</html>
